name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Verifica que los archivos JS del servidor no tengan errores de sintaxis.
      # node --check analiza sin ejecutar — falla si hay un SyntaxError real.
      - name: Syntax check — API & scripts
        run: npm run check

      # Ensambla src/ partials en index.html y falla si algún partial falta.
      - name: Build index.html from partials
        run: npm run build

      # Verifica que los archivos críticos del portfolio existen tras el build.
      - name: Required files present
        run: |
          for f in index.html styles.css api/weather.js api/forecast.js api/giphy.js; do
            [ -f "$f" ] || { echo "MISSING: $f"; exit 1; }
          done
          echo "All required files present"