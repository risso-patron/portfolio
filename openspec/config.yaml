# openspec/config.yaml
schema: spec-driven

context: |
  Tech stack: HTML5, CSS3, JavaScript (vanilla), Node.js (scripts + build), Vercel (hosting + serverless)
  Architecture: Static portfolio with src/ partials assembled by scripts/build.js; sub-projects (weather-app, pomodoro-timer, budget-app); Vercel serverless API (weather.js, forecast.js, giphy.js)
  Conventions: Mobile-first, responsive, no framework dependencies, GitHub Pages / Vercel deployment
  Testing: No test runner detected; build validation via npm run check + npm run build
  Style: No linter/formatter; Node.js syntax check via npm run check
  Last updated: 2026-05-28

known_issues:
  # Code review 2026-04-28 — sorted by priority
  - id: api-no-cors
    severity: critical
    area: security
    status: resolved
    resolved: "2026-05-28 — ALLOWED_ORIGINS allowlist added to all API handlers"
    summary: "API handlers (/api/weather, /api/forecast, /api/giphy) have no CORS/origin validation"
    file: "api/weather.js, api/forecast.js, api/giphy.js"

  - id: api-error-message-leak
    severity: critical
    area: security
    status: resolved
    resolved: "2026-05-28 — error.message no longer forwarded to client"
    summary: "Upstream error.message forwarded to client via 'detail:' field"
    file: "api/weather.js, api/forecast.js, api/giphy.js"

  - id: cv-style-leak
    severity: medium
    area: css
    status: resolved
    resolved: "2026-05-28 — styles.css is now empty; @import removed"
    summary: "@import url('/jorgeluis_CV/styles.css') loaded CV styles globally"
    file: "styles.css"

  - id: ci-decorative
    severity: medium
    area: ci
    status: resolved
    resolved: "2026-05-28 — CI now runs npm run check (syntax), npm run build, required files check"
    summary: "GitHub Actions CI never actually failed — continue-on-error: true on ESLint, build was just an echo"
    file: ".github/workflows/deploy.yml"

  - id: monolithic-html
    severity: medium
    area: architecture
    status: partially-resolved
    resolved: "2026-05-28 — src/ partials added; scripts/build.js assembles index.html from 8 partials"
    summary: "index.html is 747 lines — still large but now assembled from src/ partials via build step"
    detail: "Generated file is large; source is now split across _head, _navbar, _hero, _about, _work, _arsenal, _contact, _footer"
    file: "index.html, src/_*.html"
    fix: "Consider further decomposition or templating if complexity grows"

strict_tdd: false

rules:
  proposal:
    - Include rollback plan for risky changes
    - Identify affected modules/packages (main portfolio, sub-projects, API)
  specs:
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Document architecture decisions with rationale
    - Include sequence diagrams for complex flows (e.g., API integrations)
  tasks:
    - Group tasks by phase (content, styling, functionality, deployment)
    - Use hierarchical numbering (1.1, 1.2, etc.)
    - Keep tasks small enough to complete in one session
  apply:
    - Follow vanilla JS/CSS patterns already in use
    - Maintain mobile-first approach in all changes
    - Keep sub-projects independent and self-contained
  verify:
    - Manually test in browser (no automated test runner available)
    - Test responsive breakpoints on mobile, tablet, desktop
    - Verify all project demo links are functional
  archive:
    - Warn before merging destructive deltas (large removals)

testing:
  strict_tdd: false
  note: "Strict TDD Mode unavailable — no test runner detected"
  test_runner:
    available: false
    command: null
    framework: null
  layers:
    unit:
      available: false
      tool: null
    integration:
      available: false
      tool: null
    e2e:
      available: false
      tool: null
  coverage:
    available: false
    command: null
  quality:
    linter:
      available: true
      command: "npm run check"
      note: "Node.js syntax check (node --check) on API files and scripts — not a full linter"
    type_checker:
      available: false
      command: null
    formatter:
      available: false
      command: null
    build_validator:
      available: true
      command: "npm run build"
      note: "Assembles src/ partials into index.html; fails if any partial is missing"
